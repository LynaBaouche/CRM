version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app           
      - /app/node_modules        
    environment:
      - DATABASE_URL=postgresql://crm_user:crm_password@db:5432/crm_database
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # Le tunnel pour le code Next.js
      - /app/node_modules        # Protection des dépendances
      - /app/.next               # Protection du cache Next.js
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  pgdata: